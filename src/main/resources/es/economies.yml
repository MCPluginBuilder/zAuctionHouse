################################################################################################################################
#
#   zAuctionHouse V4 - Configuracion de Economias
#
#   Este archivo configura los proveedores de economia para la casa de subastas.
#   Puedes activar multiples economias para permitir a los jugadores comerciar con diferentes monedas.
#
#   Documentacion: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# PROVEEDORES DE ECONOMIA
#=============================================================================
# Lista de proveedores de economia activados.
# Cada economia permite a los jugadores comprar y vender objetos con esa moneda.
# Puedes activar multiples economias para dar a los jugadores la opcion de elegir.
#
# TIPOS DE ECONOMIA SOPORTADOS:
#   - VAULT        : Economia Vault estandar (funciona con cualquier plugin compatible con Vault)
#   - PLAYERPOINTS : Moneda del plugin PlayerPoints
#   - COINSENGINE  : Monedas del plugin CoinsEngine
#   - REDIRECT     : Redirige a otra economia por nombre
#   - ITEM         : Economia basada en objetos (comercia objetos especificos como moneda)
#   - LEVEL        : Niveles de experiencia como moneda
#   - EXPERIENCE   : Puntos de experiencia como moneda
#
# Cada economia puede tener:
#   - Limites de precio min/max
#   - Configuracion de impuestos
#   - Formato de visualizacion
#   - Comportamiento de cobro automatico

economies:

  #---------------------------------------------------------------------------
  # ECONOMIA VAULT
  #---------------------------------------------------------------------------
  # Economia estandar que usa la API de Vault.
  # Funciona con: EssentialsX Economy, CMI, DeluxeCoins, y muchos otros.
  - type: VAULT

    # Activar o desactivar esta economia
    # Cuando esta desactivado, los jugadores no pueden usar esta moneda.
    is-enable: true

    # Identificador interno para esta economia (debe ser unico).
    # Usado en comandos: /ah sell <precio> <cantidad> <economia>
    # Usado en referencias de config y almacenamiento de base de datos.
    # IMPORTANTE: No cambiar despues de que los jugadores hayan listado objetos con esta economia.
    name: vault

    # Nombre de visualizacion mostrado en la GUI y en los mensajes.
    # Soporta formato MiniMessage y colores.
    display-name: "Vault"

    # Formato de visualizacion del precio en la casa de subastas.
    # %price% se reemplaza por el numero de precio formateado.
    # Ejemplos:
    #   "%price%$"      -> "1.000$"
    #   "$%price%"      -> "$1.000"
    #   "%price% monedas" -> "1.000 monedas"
    format: "%price%$"

    # Simbolo corto usado en visualizaciones compactas (autocompletado, etc.)
    symbol: "v"

    # Si es true, el dinero de las ventas se deposita inmediatamente al vendedor.
    # Si es false, los vendedores deben usar /ah claim para recibir su dinero pendiente.
    # Recomendado: true para configuraciones simples, false si usas una economia cross-server.
    auto-claim: true

    # Si es true, el dinero se deposita solo cuando el vendedor esta en linea.
    # Si es false, el dinero se deposita incluso cuando el vendedor esta desconectado.
    # Util para plugins de economia que no soportan transacciones offline.
    must-be-online: false

    # Permiso opcional requerido para usar esta economia.
    # Deja comentado para permitir que todos la usen.
    # permission: "zauctionhouse.economy.vault"

    # Cadena de motivo para los retiros de economia (mostrada en los logs de economia).
    # Placeholder disponible: %items% (muestra los nombres de los objetos)
    withdraw-reason: "Compra de %items% (zAuctionHouse)"

    # Cadena de motivo para los depositos de economia (mostrada en los logs de economia).
    deposit-reason: "Venta de %items% (zAuctionHouse)"

    # Modo de formato de los numeros de precio.
    # Opciones:
    #   - PRICE_WITH_DECIMAL_FORMAT : Usa la configuracion 'price-decimal-format' abajo
    #   - PRICE_WITHOUT_DECIMAL     : Sin decimales (solo numeros enteros)
    #   - PRICE_WITH_REDUCTION      : Usa la configuracion 'price-reductions' abajo
    price-format: PRICE_WITH_DECIMAL_FORMAT

    # Limites de precio minimo para diferentes tipos de venta.
    # Los jugadores no pueden listar objetos por menos de estos montos.
    # Previene listados spam y protege el equilibrio economico.
    min-prices:
      auction: 10       # Precio minimo para subastas regulares
      rent: 500         # Precio minimo para listados de alquiler (funcionalidad futura)
      bid: 500          # Oferta inicial minima (funcionalidad futura)

    # Precio maximo para cualquier listado.
    # Los jugadores no pueden listar objetos por mas de este monto.
    # Previene abusos economicos con precios irrealistas.
    max-prices: 10000000000  # 10 mil millones

    #-------------------------------------------------------------------------
    # CONFIGURACION DE IMPUESTOS
    #-------------------------------------------------------------------------
    # Sistema de impuestos para las transacciones de subasta.
    # Util para eliminar moneda de la economia (sumidero) o financiar bancos del servidor.
    tax:
      # Activar o desactivar los impuestos para esta economia
      enabled: false

      # El tipo de impuesto determina cuando y como se cobra el impuesto:
      #
      # SELL:       El impuesto es pagado por el VENDEDOR al listar un objeto.
      #             Ejemplo: Listar un objeto a 1000$ con 5% de impuesto -> El vendedor paga 50$ de comision.
      #             El comprador paga: 1000$ | El vendedor recibe: 1000$
      #
      # PURCHASE:   El impuesto se deduce de las ganancias del VENDEDOR cuando el objeto se vende.
      #             Ejemplo: El objeto se vende a 1000$ con 5% de impuesto -> El vendedor recibe 950$.
      #             El comprador paga: 1000$ | El vendedor recibe: 950$
      #
      # BOTH:       El impuesto se aplica al listar Y a la venta.
      #             Ejemplo: 5% de impuesto al listar Y a la venta.
      #             Listado: El vendedor paga 50$ | Venta: El vendedor recibe 950$
      #
      # CAPITALISM: Impuesto estilo IVA donde el COMPRADOR paga mas, el vendedor recibe el precio completo.
      #             Ejemplo: Objeto listado a 1000$ con 5% de IVA -> El comprador paga 1050$.
      #             El comprador paga: 1050$ | El vendedor recibe: 1000$
      type: SELL

      # Metodo de calculo del impuesto:
      # - PERCENTAGE : El impuesto es un porcentaje del precio (lo mas comun)
      # - FIXED      : El impuesto es un monto fijo independientemente del precio
      amount-type: PERCENTAGE

      # Monto del impuesto (porcentaje o valor fijo segun amount-type)
      # Ejemplo: 5 = 5% de impuesto (si PERCENTAGE) o 5$ de impuesto (si FIXED)
      amount: 5

      # Permiso para evadir completamente todos los impuestos
      # Los jugadores con este permiso no pagan ningun impuesto en ninguna transaccion.
      bypass-permission: "zauctionhouse.tax.bypass"

      # Reducciones de impuestos basadas en permisos.
      # Los jugadores con estos permisos obtienen tasas de impuestos reducidas.
      # Verificadas en orden - el primer permiso coincidente se aplica.
      # La reduccion es un porcentaje MENOS sobre la tasa de impuesto normal.
      reductions:
        - permission: "zauctionhouse.tax.vip"
          percentage: 50  # 50% de reduccion (5% impuesto -> 2.5% efectivo)
        - permission: "zauctionhouse.tax.premium"
          percentage: 25  # 25% de reduccion (5% impuesto -> 3.75% efectivo)
        - permission: "zauctionhouse.tax.member"
          percentage: 10  # 10% de reduccion (5% impuesto -> 4.5% efectivo)

      #-----------------------------------------------------------------------
      # REGLAS DE IMPUESTO ESPECIFICAS POR OBJETO
      #-----------------------------------------------------------------------
      # Sobrescribir la configuracion de impuestos por defecto para objetos especificos.
      # Util para gravar objetos valiosos diferente de objetos comunes.
      item-rules:
        # Activar o desactivar las reglas de impuesto especificas por objeto
        enabled: false

        # Lista de reglas de impuesto para objetos especificos.
        # Las reglas con mayor prioridad se verifican primero.
        # La primera regla coincidente se aplica; si ninguna coincide, se usa el impuesto por defecto.
        rules: []

        # EJEMPLOS DE REGLAS (descomentar y modificar para usar):
        #
        # - name: "impuesto_diamante"          # Identificador unico de la regla
        #   priority: 100                      # Mayor = verificado primero
        #   type: PURCHASE                     # Tipo de impuesto para esta regla
        #   amount-type: PERCENTAGE
        #   amount: 10                         # 10% de impuesto en diamantes
        #   rule:
        #     type: material                   # Tipo de regla: material, lore, name, etc.
        #     materials:
        #       - DIAMOND
        #       - DIAMOND_BLOCK
        #
        # - name: "objetos_raros"
        #   priority: 90
        #   type: CAPITALISM
        #   amount-type: PERCENTAGE
        #   amount: 15                         # 15% de IVA en objetos raros
        #   rule:
        #     type: and                        # Combinar multiples condiciones
        #     rules:
        #       - type: lore
        #         mode: CONTAINS
        #         values:
        #           - "Raro"

#=============================================================================
# ECONOMIA POR DEFECTO
#=============================================================================
# Economia por defecto usada cuando los jugadores no especifican una.
# Debe coincidir con el campo 'name' de una economia activada arriba.

default-economy:
  auction: vault   # Por defecto para listados de subasta regulares
  rent: vault      # Por defecto para listados de alquiler (funcionalidad futura)
  bid: vault       # Por defecto para listados de pujas (funcionalidad futura)

#=============================================================================
# FORMATO DE PRECIOS
#=============================================================================

# Formato decimal para la visualizacion de precios.
# Usa los patrones de Java DecimalFormat.
# Ejemplos:
#   "#,###.#"   -> "1.234,5"
#   "#,###.##"  -> "1.234,56"
#   "#,###"     -> "1.234" (sin decimales)
# La coma (,) se usa como separador de miles.
price-decimal-format: '#,###.#'

#=============================================================================
# REDUCCIONES DE PRECIO (Visualizacion Compacta)
#=============================================================================
# Abrevia numeros grandes para una visualizacion mas limpia.
# Usado solo cuando price-format esta configurado a PRICE_WITH_REDUCTION.
#
# El formato usa patrones estilo printf:
#   "#.#"    -> Numero simple con 1 decimal
#   "%.1fK"  -> Numero con 1 decimal seguido de "K"
#   "%.2fM"  -> Numero con 2 decimales seguido de "M"
#
# max-amount: Los numeros HASTA este valor usan este formato.
# display: Plantilla de visualizacion personalizada opcional. %amount% es el numero formateado.

price-reductions:
  # 0 - 999: Mostrar tal cual con 1 decimal
  - format: "#.#"
    max-amount: 1000

  # 1.000 - 999.999: Mostrar en K (miles)
  # Ejemplo: 1500 -> "1.5K"
  - format: "%.1fK"
    max-amount: 1000000

  # 1.000.000 - 999.999.999: Mostrar en M (millones)
  # Ejemplo: 1500000 -> "1.5M"
  - format: "%.1fM"
    max-amount: 1000000000

  # 1.000.000.000 - 999.999.999.999: Mostrar en B (miles de millones)
  # Ejemplo: 1500000000 -> "1.5B"
  - format: "%.1fB"
    max-amount: 1000000000000

  # 1 billon+: Mostrar en T (billones) con color verde personalizado
  - format: "%.2fT"
    max-amount: 1000000000000000
    display: "<green>%amount%"

  # Montos muy grandes: Mostrar en Q (cuatrillones) con color rojo personalizado
  - format: "%.2fQ"
    max-amount: 100000000000000000
    display: "<red>%amount%"
