################################################################################################################################
#
#   zAuctionHouse V4 - การตั้งค่าเศรษฐกิจ (Economy Configuration)
#
#   ไฟล์นี้ใช้กำหนดผู้ให้บริการเศรษฐกิจ (economy providers) สำหรับ auction house
#   คุณสามารถเปิดใช้หลายเศรษฐกิจพร้อมกัน เพื่อให้ผู้เล่นเทรดด้วยสกุลเงินที่ต่างกันได้
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# ECONOMY PROVIDERS (ผู้ให้บริการเศรษฐกิจ)
#=============================================================================
# รายการ economy ที่เปิดใช้งาน
# แต่ละ economy จะให้ผู้เล่นซื้อ/ขายไอเท็มด้วยสกุลเงินนั้น ๆ
# คุณสามารถเปิดหลาย economy เพื่อให้ผู้เล่นเลือกใช้ได้
#
# ประเภท ECONOMY ที่รองรับ:
#   - VAULT        : เศรษฐกิจหลักผ่าน Vault (ทำงานกับปลั๊กอิน economy ที่รองรับ Vault ทั้งหมด)
#   - PLAYERPOINTS : สกุลเงินจากปลั๊กอิน PlayerPoints
#   - COINSENGINE  : สกุลเงินจากปลั๊กอิน CoinsEngine
#   - REDIRECT     : ส่งต่อไปใช้ economy อื่นตามชื่อ
#   - ITEM         : เศรษฐกิจแบบไอเท็ม (ใช้ไอเท็มเฉพาะเป็นสกุลเงิน)
#   - LEVEL        : ใช้เลเวล Exp เป็นสกุลเงิน
#   - EXPERIENCE   : ใช้แต้ม Exp เป็นสกุลเงิน
#
# แต่ละ economy สามารถมีการตั้งค่าของตัวเองได้ เช่น:
#   - ขอบเขตราคาต่ำสุด/สูงสุด
#   - การตั้งค่าภาษี (tax)
#   - รูปแบบการแสดงราคา
#   - การรับเงินอัตโนมัติหรือใช้คำสั่ง /ah claim
economies:

  #---------------------------------------------------------------------------
  # VAULT ECONOMY
  #---------------------------------------------------------------------------
  # เศรษฐกิจมาตรฐานที่ใช้ Vault API
  # ใช้งานร่วมกับ: EssentialsX Economy, CMI, DeluxeCoins และปลั๊กอินอื่นอีกมากมาย
  - type: VAULT

    # เปิดหรือปิดการใช้งาน economy นี้
    # ถ้าปิด ผู้เล่นจะไม่สามารถใช้สกุลเงินนี้ได้
    is-enable: true

    # ชื่อตัวระบุภายในของ economy นี้ (ต้องไม่ซ้ำกัน)
    # ใช้ในคำสั่ง: /ah sell <price> <amount> <economy>
    # ใช้ใน config และในฐานข้อมูล
    # สำคัญมาก: ห้ามเปลี่ยนชื่อนี้หากมีผู้เล่นลงขายไอเท็มด้วย economy นี้แล้ว
    name: vault

    # ชื่อที่จะแสดงใน GUI และในข้อความต่าง ๆ
    # รองรับรูปแบบ MiniMessage และสี
    display-name: "Vault"

    # รูปแบบการแสดงราคาใน auction house
    # %price% จะถูกแทนด้วยตัวเลขราคาที่จัดรูปแบบแล้ว
    # ตัวอย่าง:
    #   "%price%$"      → "1,000$"
    #   "$%price%"      → "$1,000"
    #   "%price% coins" → "1,000 coins"
    format: "%price%$"

    # สัญลักษณ์สั้น ๆ ที่ใช้ในที่แสดงแบบย่อ (เช่น tab completion)
    symbol: "v"

    # ถ้าเป็น true เงินจากการขายจะถูกโอนเข้าผู้ขายทันที
    # ถ้าเป็น false ผู้ขายต้องใช้คำสั่ง /ah claim เพื่อรับเงินที่ค้างอยู่
    # แนะนำ: true สำหรับเซ็ตอัปง่าย ๆ, false หากใช้ระบบเศรษฐกิจข้ามเซิร์ฟเวอร์
    auto-claim: true

    # ถ้าเป็น true เงินจะถูกโอนให้เมื่อผู้ขายออนไลน์เท่านั้น
    # ถ้าเป็น false เงินจะถูกโอนให้แม้ผู้ขายจะออฟไลน์อยู่
    # มีประโยชน์กับปลั๊กอิน economy ที่ไม่รองรับการโอนเงินขณะออฟไลน์
    must-be-online: false

    # Permission ที่จำเป็นสำหรับการใช้ economy นี้ (ถ้ามี)
    # ถ้าคอมเมนต์ทิ้งไว้ ทุกคนจะสามารถใช้ economy นี้ได้
    # permission: "zauctionhouse.economy.vault"

    # ข้อความเหตุผลที่ใช้ใน log ของ economy เมื่อมีการหักเงิน
    # placeholder ที่ใช้ได้: %items% (จะแสดงชื่อไอเท็ม)
    withdraw-reason: "Purchase of %items% (zAuctionHouse)"

    # ข้อความเหตุผลที่ใช้ใน log ของ economy เมื่อมีการเพิ่มเงิน
    deposit-reason: "Sale of %items% (zAuctionHouse)"

    # โหมดการจัดรูปแบบตัวเลขราคา
    # ตัวเลือก:
    #   - PRICE_WITH_DECIMAL_FORMAT : ใช้รูปแบบ 'price-decimal-format' ด้านล่าง
    #   - PRICE_WITHOUT_DECIMAL     : ไม่มีทศนิยม (จำนวนเต็มเท่านั้น)
    #   - PRICE_WITH_REDUCTION      : ใช้การย่อตัวเลข 'price-reductions' ด้านล่าง
    price-format: PRICE_WITH_DECIMAL_FORMAT

    # ราคาต่ำสุดสำหรับประเภทการขายแต่ละแบบ
    # ผู้เล่นจะไม่สามารถลงขายต่ำกว่าค่านี้ได้
    # ช่วยป้องกันสแปมและรักษาสมดุลเศรษฐกิจ
    min-prices:
      auction: 10       # ราคาต่ำสุดสำหรับประมูลปกติ
      rent: 500         # ราคาต่ำสุดสำหรับประกาศให้เช่า (ฟีเจอร์ในอนาคต)
      bid: 500          # ราคาประมูลเริ่มต้นต่ำสุด (ฟีเจอร์ในอนาคต)

    # ราคาสูงสุดที่อนุญาตให้ลงขาย
    # ผู้เล่นจะไม่สามารถตั้งราคามากกว่าค่านี้ได้
    # ป้องกันการโก่งราคาเกินจริง
    max-prices: 10000000000  # 10 พันล้าน

    #-------------------------------------------------------------------------
    # TAX CONFIGURATION (การตั้งค่าภาษี)
    #-------------------------------------------------------------------------
    # ระบบภาษีสำหรับธุรกรรมใน auction
    # ใช้สำหรับดึงเงินออกจากระบบ (money sink) หรือใช้เป็นกองทุนของเซิร์ฟเวอร์
    tax:
      # เปิดหรือปิดระบบภาษีสำหรับ economy นี้
      enabled: false

      # รูปแบบการเก็บภาษี:
      #
      # SELL:       ผู้ขายจ่ายภาษีตอน "ลงขาย"
      #             ตัวอย่าง: ลงขาย 1000$ ภาษี 5% → ผู้ขายจ่าย 50$ เป็นค่าลงขาย
      #             ผู้ซื้อจ่าย: 1000$ | ผู้ขายได้รับ: 1000$
      #
      # PURCHASE:   หักภาษีจากเงินที่ผู้ขายได้รับ เมื่อตัวไอเท็มถูกซื้อไป
      #             ตัวอย่าง: ขายได้ 1000$ ภาษี 5% → ผู้ขายได้รับ 950$
      #             ผู้ซื้อจ่าย: 1000$ | ผู้ขายได้รับ: 950$
      #
      # BOTH:       เก็บภาษีทั้งตอนลงขาย และตอนขายสำเร็จ
      #             ตัวอย่าง: ภาษี 5% ตอนลงขาย และ 5% ตอนขาย
      #             ลงขาย: ผู้ขายจ่าย 50$ | ขาย: ผู้ขายได้รับ 950$
      #
      # CAPITALISM: ภาษีแบบ VAT ผู้ซื้อเป็นคนจ่ายเพิ่ม ผู้ขายได้เงินเต็ม
      #             ตัวอย่าง: ลงขาย 1000$ ภาษี 5% → ผู้ซื้อจ่าย 1050$
      #             ผู้ซื้อจ่าย: 1050$ | ผู้ขายได้รับ: 1000$
      type: SELL

      # วิธีคำนวณภาษี:
      # - PERCENTAGE : ภาษีคิดเป็นเปอร์เซ็นต์ของราคา (ใช้บ่อยที่สุด)
      # - FIXED      : ภาษีเป็นจำนวนเงินตายตัว ไม่ขึ้นกับราคา
      amount-type: PERCENTAGE

      # จำนวนภาษี (ตาม amount-type ว่าเป็นเปอร์เซ็นต์หรือจำนวนคงที่)
      # ตัวอย่าง: 5 = 5% (ถ้า PERCENTAGE) หรือ 5$ (ถ้า FIXED)
      amount: 5

      # Permission สำหรับยกเว้นภาษีทั้งหมด
      # ผู้เล่นที่มี permission นี้จะไม่ถูกเก็บภาษีเลย
      bypass-permission: "zauctionhouse.tax.bypass"

      # การลดภาษีตาม permission
      # ผู้เล่นที่มี permission เหล่านี้จะได้อัตราภาษีที่ลดลง
      # จะตรวจตามลำดับบนลงล่าง เจออันแรกที่ตรงก็ใช้ตัวนั้น
      # percentage คือเปอร์เซ็นต์ "ที่ลดออกไป" จากอัตราปกติ
      reductions:
        - permission: "zauctionhouse.tax.vip"
          percentage: 50  # ลด 50% (ภาษี 5% → เหลือ 2.5%)
        - permission: "zauctionhouse.tax.premium"
          percentage: 25  # ลด 25% (ภาษี 5% → เหลือ 3.75%)
        - permission: "zauctionhouse.tax.member"
          percentage: 10  # ลด 10% (ภาษี 5% → เหลือ 4.5%)

      #-----------------------------------------------------------------------
      # ITEM-SPECIFIC TAX RULES (ภาษีเฉพาะไอเท็ม)
      #-----------------------------------------------------------------------
      # ใช้ override การตั้งค่าภาษีปกติสำหรับไอเท็มบางชนิด
      # มีประโยชน์ถ้าต้องการเก็บภาษีต่างกันระหว่างของหายากกับของทั่วไป
      item-rules:
        # เปิด/ปิดการใช้กฎภาษีเฉพาะไอเท็ม
        enabled: false

        # รายการกฎภาษีสำหรับไอเท็มเฉพาะ
        # กฎที่มี priority สูงกว่าจะถูกตรวจดูก่อน
        # ใช้ "กฎแรก" ที่ตรงเงื่อนไข ถ้าไม่มีตรงเลยจะใช้ภาษีค่าเริ่มต้น
        rules: []

        # ตัวอย่างกฎ (เอา # ออกแล้วแก้ค่าถ้าต้องการใช้):
        #
        # - name: "diamond_tax"           # ชื่อกฎ (ต้องไม่ซ้ำ)
        #   priority: 100                 # ยิ่งมากยิ่งถูกตรวจดูก่อน
        #   type: PURCHASE                # ประเภทภาษีของกฎนี้
        #   amount-type: PERCENTAGE
        #   amount: 10                    # ภาษี 10% สำหรับเพชร
        #   rule:
        #     type: material              # ประเภทกฎ: material, lore, name ฯลฯ
        #     materials:
        #       - DIAMOND
        #       - DIAMOND_BLOCK
        #
        # - name: "rare_items"
        #   priority: 90
        #   type: CAPITALISM
        #   amount-type: PERCENTAGE
        #   amount: 15                    # VAT 15% สำหรับของหายาก
        #   rule:
        #     type: and                   # รวมหลายเงื่อนไข
        #     rules:
        #       - type: lore
        #         mode: CONTAINS
        #         values:
        #           - "Rare"

#=============================================================================
# DEFAULT ECONOMY (เศรษฐกิจเริ่มต้น)
#=============================================================================
# เศรษฐกิจหลักที่ใช้เมื่อผู้เล่นไม่ได้ระบุ economy เอง
# ต้องตรงกับค่า 'name' ของ economy ใด economy หนึ่งด้านบนและต้องเปิดใช้งานอยู่
default-economy:
  auction: vault   # ดีฟอลต์สำหรับลงขายแบบปกติ
  rent: vault      # ดีฟอลต์สำหรับลงขายแบบให้เช่า (ฟีเจอร์ในอนาคต)
  bid: vault       # ดีฟอลต์สำหรับลงขายแบบประมูล (ฟีเจอร์ในอนาคต)

#=============================================================================
# PRICE FORMATTING (รูปแบบการแสดงราคา)
#=============================================================================

# รูปแบบตัวเลขทศนิยมที่ใช้แสดงราคา
# ใช้รูปแบบ Java DecimalFormat
# ตัวอย่าง:
#   "#,###.#"   → "1,234.5"
#   "#,###.##"  → "1,234.56"
#   "#,###"     → "1,234" (ไม่มีทศนิยม)
# เครื่องหมายคอมมา (,) ใช้เป็นตัวคั่นหลักพัน
price-decimal-format: '#,###.#'

#=============================================================================
# PRICE REDUCTIONS (Compact Display) การย่อตัวเลขราคา
#=============================================================================
# ใช้ย่อตัวเลขจำนวนมากให้สั้นลงเพื่อให้ UI ดูอ่านง่าย
# ใช้งานเฉพาะเมื่อ price-format ถูกตั้งเป็น PRICE_WITH_REDUCTION
#
# รูปแบบใช้สไตล์ printf:
#   "#.#"    → ตัวเลขธรรมดา 1 ตำแหน่งทศนิยม
#   "%.1fK"  → จำนวนทศนิยม 1 ตำแหน่ง ตามด้วย "K"
#   "%.2fM"  → จำนวนทศนิยม 2 ตำแหน่ง ตามด้วย "M"
#
# max-amount: จำนวนสูงสุดที่ใช้รูปแบบนี้
# display: เทมเพลตสำหรับแสดงผล (ถ้าใส่) โดย %amount% คือค่าที่ฟอร์แมตแล้ว
price-reductions:
  # 0 - 999: แสดงตัวเลขตรง ๆ พร้อมทศนิยม 1 ตำแหน่ง
  - format: "#.#"
    max-amount: 1000

  # 1,000 - 999,999: แสดงเป็น K (พัน)
  # ตัวอย่าง: 1500 → "1.5K"
  - format: "%.1fK"
    max-amount: 1000000

  # 1,000,000 - 999,999,999: แสดงเป็น M (ล้าน)
  # ตัวอย่าง: 1500000 → "1.5M"
  - format: "%.1fM"
    max-amount: 1000000000

  # 1,000,000,000 - 999,999,999,999: แสดงเป็น B (พันล้าน)
  # ตัวอย่าง: 1500000000 → "1.5B"
  - format: "%.1fB"
    max-amount: 1000000000000

  # 1 ล้านล้านขึ้นไป: แสดงเป็น T (trillion) พร้อมใส่สีเขียว
  - format: "%.2fT"
    max-amount: 1000000000000000
    display: "<green>%amount%"

  # จำนวนที่ใหญ่กว่านั้นมาก ๆ: แสดงเป็น Q (quadrillion) พร้อมใส่สีแดง
  - format: "%.2fQ"
    max-amount: 100000000000000000
    display: "<red>%amount%"