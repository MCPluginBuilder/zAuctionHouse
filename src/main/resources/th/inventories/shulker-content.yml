################################################################################################################################
#
#   zAuctionHouse V4 - Shulker Content Inventory
#
#   Inventory นี้ใช้แสดงของด้านในกล่อง shulker ที่ถูกนำมาลงขาย
#   ให้ผู้ซื้อสามารถดูของข้างในได้ก่อนตัดสินใจซื้อ
#
#   FEATURES:
#   - ดูของทั้งหมดที่อยู่ใน shulker
#   - เลื่อนไปดู shulker หลายกล่องได้ (ในกรณีขายแบบชุดใหญ่)
#   - เป็นโหมดดูอย่างเดียว - ไม่สามารถหยิบไอเทมออกได้
#
#   ACCESS:
#   - คลิกปุ่ม "View Shulker Content" ในหน้าต่างยืนยันการซื้อ/ถอดประกาศ
#   - จะแสดงเฉพาะเมื่อไอเทมที่กำลังขายมี shulker อยู่ข้างใน
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# INVENTORY SETTINGS
#=============================================================================

# ชื่อ inventory พร้อม placeholder สำหรับเลื่อนดูหลาย shulker
# %shulker-current% = หมายเลข shulker ปัจจุบัน (เริ่มที่ 1)
# %shulker-total%   = จำนวน shulker ทั้งหมดในดีลนี้
name: "#0c1719Shulker Content (%shulker-current%/%shulker-total%)"

# ขนาด inventory - 6 แถว
size: 54

#=============================================================================
# PATTERNS
#=============================================================================

patterns:
  # กรอบกระจกตกแต่งรอบ ๆ
  - 'zauctionhouse-decoration'
  # ปุ่มกลับไปหน้าต่างยืนยันก่อนหน้า
  - 'zauctionhouse-back'

#=============================================================================
# ITEMS
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # แสดงของด้านใน shulker (SHULKER CONTENT DISPLAY)
  #---------------------------------------------------------------------------
  # แสดงเนื้อหาของ shulker กล่องที่เลือกอยู่ในตอนนี้
  # แสดงเป็นกริด 7×4 เพื่อให้ใกล้เคียงกับที่เก็บของของ shulker

  content:
    # ประเภทปุ่ม - ใช้แสดงของด้านใน shulker
    type: ZAUCTIONHOUSE_SHULKER_CONTENT

    # ช่องที่ใช้แสดงของด้านใน shulker
    # 4 แถว × 7 คอลัมน์ = 28 ช่อง (shulker เก็บได้ 27 ช่อง)
    slots:
      - 9-17    # แถวที่ 2
      - 18-26   # แถวที่ 3
      - 27-35   # แถวที่ 4
      - 36-44   # แถวที่ 5

    # ช่องที่แสดงตัวบ่งชี้ว่างเมื่อ shulker ไม่มีของ
    empty-slot: 22

    # ไอเทมที่แสดงเมื่อ shulker ว่างเปล่า
    item:
      material: BARRIER
      name: "#2CCED2<bold>sʜᴜʟᴋᴇʀ ว่างเปล่า"
      lore:
        - "#92ffffกล่อง shulker นี้ไม่มีไอเทมอยู่ข้างใน"

  #---------------------------------------------------------------------------
  # แสดงข้อมูล shulker ปัจจุบัน (SHULKER INFO DISPLAY)
  #---------------------------------------------------------------------------
  # แสดงข้อมูลของ shulker ที่กำลังดูอยู่ตอนนี้

  shulker-info:
    # ประเภทปุ่ม - ใช้แสดงข้อมูล shulker ปัจจุบัน
    type: ZAUCTIONHOUSE_SHULKER_INFO

    # ตำแหน่งช่อง - กึ่งกลางแถวบน
    slot: 4

    item:
      material: SHULKER_BOX
      name: "#2CCED2<bold>sʜᴜʟᴋᴇʀ ʙᴏx"
      lore:
        # แสดงลำดับของ shulker ที่กำลังดูอยู่เทียบกับจำนวนทั้งหมด
        - "#92ffffกำลังดู shulker กล่องที่ #2CCED2%shulker_current% #92ffffจากทั้งหมด #2CCED2%shulker_total%"
        - ""
        - "#8c8c8c• ใช้ปุ่มเลื่อนด้านล่างเพื่อเปลี่ยนกล่อง"

  #---------------------------------------------------------------------------
  # ปุ่มเลื่อนไป shulker ก่อนหน้า (PREVIOUS SHULKER BUTTON)
  #---------------------------------------------------------------------------
  # เลื่อนไปดู shulker กล่องก่อนหน้าในกรณีขายแบบชุดใหญ่

  previous:
    # ประเภทปุ่ม - ใช้ควบคุมการเลื่อน shulker
    type: ZAUCTIONHOUSE_SHULKER_NAVIGATION

    # ทิศทางในการเลื่อน
    direction: previous

    # ตำแหน่งช่อง - ด้านซ้ายของกึ่งกลางแถวล่าง
    slot: 48

    item:
      material: ARROW
      name: "#2CCED2<bold>ก่อนหน้า sʜᴜʟᴋᴇʀ"
      lore:
        - "#92ffffดู shulker กล่องก่อนหน้า"
        - ""
        - "#8c8c8c• #2CCED2คลิก #92ffffเพื่อไปกล่องก่อนหน้า"

  #---------------------------------------------------------------------------
  # ปุ่มเลื่อนไป shulker ถัดไป (NEXT SHULKER BUTTON)
  #---------------------------------------------------------------------------
  # เลื่อนไปดู shulker กล่องถัดไปในกรณีขายแบบชุดใหญ่

  next:
    # ประเภทปุ่ม - ใช้ควบคุมการเลื่อน shulker
    type: ZAUCTIONHOUSE_SHULKER_NAVIGATION

    # ทิศทางในการเลื่อน
    direction: next

    # ตำแหน่งช่อง - ด้านขวาของกึ่งกลางแถวล่าง
    slot: 50

    item:
      material: ARROW
      name: "#2CCED2<bold>ถัดไป sʜᴜʟᴋᴇʀ"
      lore:
        - "#92ffffดู shulker กล่องถัดไป"
        - ""
        - "#8c8c8c• #2CCED2คลิก #92ffffเพื่อไปกล่องถัดไป"