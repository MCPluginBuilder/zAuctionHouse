################################################################################################################################
#
#   zAuctionHouse V4 - Expired Items Inventory
#
#   Inventory นี้ใช้แสดงไอเทมที่หมดอายุโดยไม่ได้ถูกขาย
#   ผู้เล่นสามารถกดรับไอเทมเหล่านี้กลับเข้ากระเป๋าของตัวเองได้
#
#   EXPIRATION:
#   - ไอเทมจะหมดอายุตามเวลาที่ตั้งไว้ใน config.yml (ค่าเริ่มต้น: 2 วัน)
#   - เมื่อหมดอายุ ไอเทมจะถูกย้ายจากประกาศขายปกติ มาอยู่ใน inventory นี้
#   - ไอเทมใน inventory นี้ก็มีเวลาเก็บรักษา (ค่าเริ่มต้น: 1 สัปดาห์) ก่อนถูกลบถาวร
#
#   ACCESS:
#   - /ah expired
#   - คลิกปุ่ม "Expired Items" ในหน้า auction หลัก
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# INVENTORY SETTINGS
#=============================================================================

# ชื่อ inventory พร้อม placeholder สำหรับหน้าปัจจุบัน / หน้าทั้งหมด
# %page% = หน้าปัจจุบัน, %max-page% = จำนวนหน้าทั้งหมด
name: '#0c1719Expired items (%page%/%max-page%)'

# ขนาด inventory - 6 แถว
size: 54

#=============================================================================
# PATTERNS
#=============================================================================

patterns:
  # กรอบกระจกตกแต่งรอบ ๆ
  - 'zauctionhouse-decoration'
  # ปุ่มย้อนหน้า / หน้าถัดไป
  - 'zauctionhouse-pagination'
  # ปุ่มกลับไปหน้า auction หลัก
  - 'zauctionhouse-back'

#=============================================================================
# ITEMS
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # แสดงไอเทมหมดอายุ (EXPIRED ITEMS DISPLAY)
  #---------------------------------------------------------------------------
  # แสดงไอเทมหมดอายุทั้งหมดที่ผู้เล่นคนนี้เป็นเจ้าของ
  # คลิกที่ไอเทมเพื่อกดรับกลับเข้ากระเป๋า

  items:
    # ประเภทปุ่ม - แสดงและจัดการไอเทมหมดอายุ
    type: ZAUCTIONHOUSE_EXPIRED_ITEMS

    # ช่องสำหรับแสดงไอเทม placeholder เมื่อไม่มีไอเทมหมดอายุ
    empty-slot: 22

    # ช่องสำหรับแสดงไอเทมหมดอายุ (4 แถว × 9 คอลัมน์ = 36 ช่อง)
    slots:
      - 9-17    # แถวที่ 2
      - 18-26   # แถวที่ 3
      - 27-35   # แถวที่ 4
      - 36-44   # แถวที่ 5

    # ไอเทม placeholder เมื่อไม่มีไอเทมหมดอายุเลย
    item:
      material: BARRIER
      name: '#ff0000&nไม่พบไอเทมหมดอายุ'

  remove-all:
    type: ZAUCTIONHOUSE_REMOVE_ALL_EXPIRED
    is-permanent: true
    slot: 47
    item:
      material: CHEST
      name: "#2CCED2<bold>Retrieve All"
      lore:
        - "#92ffffRetrieve all expired items."
        - ""
        - "#8c8c8c• #2CCED2Click #92ffffto retrieve all"