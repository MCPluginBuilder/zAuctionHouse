################################################################################################################################
#
#   zAuctionHouse V4 - Purchased Items Inventory
#
#   Inventory นี้ใช้แสดงไอเทมที่ผู้เล่นซื้อจาก auction house แล้ว
#   ผู้เล่นสามารถกดรับไอเทมที่ซื้อไว้กลับเข้ากระเป๋าจากที่นี่ได้
#
#   ITEM DELIVERY:
#   - ถ้า 'give-item' เป็น false ใน config.yml ไอเทมที่ซื้อจะถูกส่งมาเก็บใน inventory นี้
#   - ถ้า 'give-item' เป็น true ไอเทมจะถูกส่งเข้ากระเป๋าโดยตรง (ถ้ามีช่องว่างเพียงพอ)
#   - ไอเทมใน inventory นี้มีเวลาเก็บรักษา (ค่าเริ่มต้น: 1 สัปดาห์) ก่อนถูกลบถาวร
#
#   ACCESS:
#   - /ah purchased
#   - คลิกปุ่ม "Purchased Items" ในหน้า auction หลัก
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# INVENTORY SETTINGS
#=============================================================================

# ชื่อ inventory พร้อม placeholder สำหรับหน้าปัจจุบัน / หน้าทั้งหมด
name: '#0c1719Purchased items (%page%/%max-page%)'

# ขนาด inventory - 6 แถว
size: 54

#=============================================================================
# PATTERNS
#=============================================================================

patterns:
  # กรอบกระจกตกแต่งรอบ ๆ
  - 'zauctionhouse-decoration'
  # ปุ่มย้อนหน้า / หน้าถัดไป
  - 'zauctionhouse-pagination'
  # ปุ่มกลับไปหน้า auction หลัก
  - 'zauctionhouse-back'

#=============================================================================
# ITEMS
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # แสดงไอเทมที่เคยซื้อ (PURCHASED ITEMS DISPLAY)
  #---------------------------------------------------------------------------
  # แสดงไอเทมทั้งหมดที่ผู้เล่นคนนี้เคยซื้อ
  # คลิกที่ไอเทมเพื่อกดรับกลับเข้ากระเป๋า

  items:
    # ประเภทปุ่ม - แสดงและจัดการไอเทมที่ซื้อแล้ว
    type: ZAUCTIONHOUSE_PURCHASED_ITEMS

    # ช่องสำหรับแสดงไอเทม placeholder เมื่อไม่มีไอเทมที่เคยซื้อ
    empty-slot: 22

    # ช่องสำหรับแสดงไอเทมที่เคยซื้อ (4 แถว × 9 คอลัมน์ = 36 ช่อง)
    slots:
      - 9-17    # แถวที่ 2
      - 18-26   # แถวที่ 3
      - 27-35   # แถวที่ 4
      - 36-44   # แถวที่ 5

    # ไอเทม placeholder เมื่อไม่มีไอเทมที่เคยซื้อเลย
    item:
      material: BARRIER
      name: '#ff0000&nไม่พบไอเทมที่เคยซื้อ'

  remove-all:
    type: ZAUCTIONHOUSE_REMOVE_ALL_PURCHASED
    is-permanent: true
    slot: 47
    item:
      material: CHEST
      name: "#2CCED2<bold>Retrieve All"
      lore:
        - "#92ffffRetrieve all purchased items."
        - ""
        - "#8c8c8c• #2CCED2Click #92ffffto retrieve all"