################################################################################################################################
#
#   zAuctionHouse V4 - Selling Items Inventory (Your Items)
#
#   Inventory นี้ใช้แสดงไอเทมที่ผู้เล่นกำลังลงขายอยู่ในตอนนี้
#   ผู้เล่นสามารถถอดประกาศขายจากที่นี่เพื่อยกเลิกการขายและรับไอเทมคืน
#
#   FEATURES:
#   - ดูรายการลงขายทั้งหมดของตัวเอง
#   - ดูเวลาที่เหลือก่อนหมดอายุของแต่ละประกาศ
#   - ถอดไอเทมออกจากการขาย (ยกเลิกประกาศ)
#   - ไอเทมในมุมมองนี้จะไม่สามารถซื้อได้ (เพราะเป็นของผู้เล่นเอง)
#
#   ACCESS:
#   - /ah selling
#   - คลิกปุ่ม "Your Items" ในหน้า auction หลัก
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# INVENTORY SETTINGS
#=============================================================================

# ชื่อ inventory พร้อม placeholder สำหรับหน้าปัจจุบัน / หน้าทั้งหมด
name: '#0c1719Selling items (%page%/%max-page%)'

# ขนาด inventory - 6 แถว
size: 54

#=============================================================================
# PATTERNS
#=============================================================================

patterns:
  # กรอบกระจกตกแต่งรอบ ๆ
  - 'zauctionhouse-decoration'
  # ปุ่มย้อนหน้า / หน้าถัดไป
  - 'zauctionhouse-pagination'
  # ปุ่มกลับไปหน้า auction หลัก
  - 'zauctionhouse-back'

#=============================================================================
# ITEMS
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # แสดงไอเทมที่กำลังขาย (SELLING ITEMS DISPLAY)
  #---------------------------------------------------------------------------
  # แสดงไอเทมทั้งหมดที่ผู้เล่นคนนี้กำลังลงขายอยู่
  # คลิกที่ไอเทมเพื่อถอดออกจากการขาย

  items:
    # ประเภทปุ่ม - แสดงและจัดการไอเทมที่ผู้เล่นลงขายอยู่
    type: ZAUCTIONHOUSE_SELLING_ITEMS

    # ช่องสำหรับแสดงไอเทม placeholder เมื่อไม่มีไอเทมลงขาย
    empty-slot: 22

    # ช่องสำหรับแสดงไอเทมที่กำลังขาย (4 แถว × 9 คอลัมน์ = 36 ช่อง)
    slots:
      - 9-17    # แถวที่ 2
      - 18-26   # แถวที่ 3
      - 27-35   # แถวที่ 4
      - 36-44   # แถวที่ 5

    # ไอเทม placeholder เมื่อไม่มีไอเทมที่กำลังลงขายเลย
    item:
      material: BARRIER
      name: '#ff0000&nไม่พบไอเทมที่กำลังขาย'

  remove-all:
    type: ZAUCTIONHOUSE_REMOVE_ALL_SELLING
    is-permanent: true
    slot: 47
    item:
      material: CHEST
      name: "#2CCED2<bold>Retrieve All"
      lore:
        - "#92ffffRetrieve all listed items."
        - ""
        - "#8c8c8c• #2CCED2Click #92ffffto retrieve all"