        - '#8c8c8c• #2CCED2คลิก #92ffffเพื่อสลับ'

  broadcast-purchase:
    type: ZAUCTIONHOUSE_OPTION_TOGGLE
    slot: 15
    option-name: broadcast_purchase
    enable-text: '<green>เปิด'
    disable-text: '<red>ปิด'
