name: '#0c1719ตัวเลือก'
size: 27

patterns:
  - 'zauctionhouse-decoration'
  - 'zauctionhouse-back'

items:

  broadcast-sell:
    type: ZAUCTIONHOUSE_OPTION_TOGGLE
    slot: 11
    option-name: broadcast_sell
    enable-text: '<green>เปิด'
    disable-text: '<red>ปิด'
    item:
      material: OAK_SIGN
      name: '#2CCED2<bold>การประกาศการขาย'
      lore:
        - ''
        - '#92ffffเปิด/ปิดข้อความประกาศการขาย'
        - '#92ffffเมื่อเปิด คุณจะเห็นข้อความ'
        - '#92ffffเมื่อผู้เล่นลงขายไอเทม'
        - ''
        - '#8c8c8cสถานะ: %option_status%'
