        - '#92ffffเมื่อผู้เล่นซื้อไอเทม'
        - ''
        - '#8c8c8cสถานะ: %option_status%'
        - ''
        - '#8c8c8c• #2CCED2คลิก #92ffffเพื่อสลับ'
