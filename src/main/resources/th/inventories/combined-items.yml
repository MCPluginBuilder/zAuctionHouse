################################################################################################################################
#
#   zAuctionHouse V4 - รายการรวม
#
#   อินเวนทอรีนี้รวมไอเทมที่กำลังขาย หมดอายุ และซื้อแล้วไว้ในรายการเดียว
#   คุณสามารถตั้งค่าประเภทที่ต้องการแสดงได้
#
#   คุณสมบัติ:
#   - รวมไอเทมที่กำลังขาย หมดอายุ และซื้อแล้วในหน้าเดียว
#   - แต่ละประเภทใช้การตั้งค่า lore ของตัวเอง (จาก config.yml item-lore)
#   - การคลิกจะทำงานตามประเภทของไอเทม:
#     - ไอเทมที่กำลังขาย: ยกเลิกการขาย
#     - ไอเทมที่หมดอายุ: รับไอเทมคืน
#     - ไอเทมที่ซื้อแล้ว: รับไอเทมที่ซื้อ
#
#   การตั้งค่า:
#   - include-selling: true/false - รวมไอเทมที่กำลังขาย
#   - include-expired: true/false - รวมไอเทมที่หมดอายุ
#   - include-purchased: true/false - รวมไอเทมที่ซื้อแล้ว
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# ตั้งค่าอินเวนทอรี
#=============================================================================

name: '#0c1719ไอเทมของฉัน (%page%/%max-page%)'

size: 54

#=============================================================================
# PATTERNS
#=============================================================================

patterns:
  - 'zauctionhouse-decoration'
  - 'zauctionhouse-pagination'
  - 'zauctionhouse-back'

#=============================================================================
# ITEMS
#=============================================================================

items:

  items:
    type: ZAUCTIONHOUSE_COMBINED_ITEMS
    empty-slot: 22
    include-selling: true
    include-expired: true
    include-purchased: true
    slots:
      - 9-17
      - 18-26
      - 27-35
      - 36-44
    item:
      material: BARRIER
      name: '#ff0000&nไม่พบไอเทม'
