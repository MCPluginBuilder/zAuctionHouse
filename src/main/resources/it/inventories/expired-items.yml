################################################################################################################################
#
#   zAuctionHouse V4 - Inventario degli Oggetti Scaduti
#
#   Questo inventario mostra gli oggetti che sono scaduti senza essere venduti.
#   I giocatori possono ritirare questi oggetti nel loro inventario.
#
#   SCADENZA:
#   - Gli oggetti scadono dopo il tempo definito in config.yml (predefinito: 2 giorni)
#   - Gli oggetti scaduti vengono spostati dagli annunci attivi a questo inventario
#   - Gli oggetti qui hanno anche una scadenza (predefinito: 1 settimana) prima della cancellazione definitiva
#
#   ACCESSO:
#   - /ah expired
#   - Clicca sul pulsante "Oggetti scaduti" nella casa d'aste principale
#
#   Documentazione: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# IMPOSTAZIONI DELL'INVENTARIO
#=============================================================================

# Titolo dell'inventario con placeholder di paginazione.
# %page% = pagina attuale, %max-page% = totale pagine
name: '#0c1719Oggetti scaduti (%page%/%max-page%)'

# Dimensione dell'inventario - 6 righe.
size: 54

#=============================================================================
# PATTERN
#=============================================================================

patterns:
  # Bordi decorativi in vetro.
  - 'zauctionhouse-decoration'
  # Pulsanti pagina precedente/successiva.
  - 'zauctionhouse-pagination'
  # Pulsante indietro per tornare alla casa d'aste.
  - 'zauctionhouse-back'

#=============================================================================
# OGGETTI
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # VISUALIZZAZIONE DEGLI OGGETTI SCADUTI
  #---------------------------------------------------------------------------
  # Mostra tutti gli oggetti scaduti appartenenti al giocatore.
  # Clicca sugli oggetti per ritirarli.

  items:
    # Tipo di pulsante - visualizza e gestisce gli oggetti scaduti.
    type: ZAUCTIONHOUSE_EXPIRED_ITEMS

    # Slot per il placeholder dello stato vuoto.
    empty-slot: 22

    # Slot per visualizzare gli oggetti scaduti (4 righe × 9 colonne = 36 slot).
    slots:
      - 9-17    # Riga 2
      - 18-26   # Riga 3
      - 27-35   # Riga 4
      - 36-44   # Riga 5

    # Oggetto placeholder quando non esistono oggetti scaduti.
    item:
      material: BARRIER
      name: '#ff0000&nNessun oggetto trovato'

  remove-all:
    type: ZAUCTIONHOUSE_REMOVE_ALL_EXPIRED
    is-permanent: true
    slot: 47
    item:
      material: CHEST
      name: "#2CCED2<bold>Ritira tutto"
      lore:
        - "#92ffffRitira tutti gli oggetti scaduti."
        - ""
        - "#8c8c8c• #2CCED2Clicca #92ffffper ritirare tutto"
