################################################################################################################################
#
#   zAuctionHouse V4 - Shulker Content Inventory
#
#   This inventory displays the contents of shulker boxes being sold.
#   Allows buyers to preview what's inside before purchasing.
#
#   FEATURES:
#   - Preview all items inside shulker boxes
#   - Navigate between multiple shulkers (bulk sales)
#   - View-only mode - items cannot be taken
#
#   ACCESS:
#   - Click "View Shulker Content" button in purchase/remove confirmations
#   - Only appears when the item being sold contains shulker boxes
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# INVENTORY SETTINGS
#=============================================================================

# Inventory title with shulker navigation placeholders.
# %shulker-current% = currently viewing shulker number (1-based)
# %shulker-total% = total number of shulkers in the sale
name: "#0c1719Shulker Content (%shulker-current%/%shulker-total%)"

# Inventory size - 6 rows.
size: 54

#=============================================================================
# PATTERNS
#=============================================================================

patterns:
  # Decorative glass pane borders.
  - 'zauctionhouse-decoration'
  # Back button to return to confirmation screen.
  - 'zauctionhouse-back'

#=============================================================================
# ITEMS
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # SHULKER CONTENT DISPLAY
  #---------------------------------------------------------------------------
  # Shows the contents of the currently selected shulker box.
  # Items are displayed in a 7×4 grid to mimic shulker storage.

  content:
    # Button type - displays shulker contents.
    type: ZAUCTIONHOUSE_SHULKER_CONTENT

    # Slots for displaying shulker contents.
    # 4 rows × 7 columns = 28 slots (shulkers hold 27 items).
    slots:
      - 9-17    # Row 2
      - 18-26   # Row 3
      - 27-35   # Row 4
      - 36-44   # Row 5

    # Slot where the empty indicator is shown when the shulker has no items.
    empty-slot: 22

    # Item displayed when the shulker box is empty.
    item:
      material: BARRIER
      name: "#2CCED2<bold>ᴇᴍᴘᴛʏ sʜᴜʟᴋᴇʀ"
      lore:
        - "#92ffffThis shulker box does not contain any items."

  #---------------------------------------------------------------------------
  # SHULKER INFO DISPLAY
  #---------------------------------------------------------------------------
  # Shows information about the current shulker being viewed.

  shulker-info:
    # Button type - displays current shulker info.
    type: ZAUCTIONHOUSE_SHULKER_INFO

    # Slot position - center of top row.
    slot: 4

    item:
      material: SHULKER_BOX
      name: "#2CCED2<bold>sʜᴜʟᴋᴇʀ ʙᴏx"
      lore:
        # Shows current position in the shulker list.
        - "#92ffffViewing shulker #2CCED2%shulker_current% #92ffffof #2CCED2%shulker_total%"
        - ""
        - "#8c8c8c• Use navigation buttons to switch"

  #---------------------------------------------------------------------------
  # PREVIOUS SHULKER BUTTON
  #---------------------------------------------------------------------------
  # Navigates to the previous shulker in bulk sales.

  previous:
    # Button type - handles shulker navigation.
    type: ZAUCTIONHOUSE_SHULKER_NAVIGATION

    # Direction to navigate.
    direction: previous

    # Slot position - left of center in bottom row.
    slot: 48

    item:
      material: ARROW
      name: "#2CCED2<bold>ᴘʀᴇᴠɪᴏᴜs sʜᴜʟᴋᴇʀ"
      lore:
        - "#92ffffView the previous shulker box."
        - ""
        - "#8c8c8c• #2CCED2Click #92ffffto view previous"

  #---------------------------------------------------------------------------
  # NEXT SHULKER BUTTON
  #---------------------------------------------------------------------------
  # Navigates to the next shulker in bulk sales.

  next:
    # Button type - handles shulker navigation.
    type: ZAUCTIONHOUSE_SHULKER_NAVIGATION

    # Direction to navigate.
    direction: next

    # Slot position - right of center in bottom row.
    slot: 50

    item:
      material: ARROW
      name: "#2CCED2<bold>ɴᴇxᴛ sʜᴜʟᴋᴇʀ"
      lore:
        - "#92ffffView the next shulker box."
        - ""
        - "#8c8c8c• #2CCED2Click #92ffffto view next"
