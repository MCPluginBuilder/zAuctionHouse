################################################################################################################################
#
#   zAuctionHouse V4 - Purchased Items Inventory
#
#   This inventory displays items the player has bought from the auction house.
#   Players can retrieve purchased items to their inventory from here.
#
#   ITEM DELIVERY:
#   - If 'give-item' is false in config.yml, items come here after purchase
#   - If 'give-item' is true, items go directly to inventory (if space available)
#   - Items here have an expiration (default: 1 week) before permanent deletion
#
#   ACCESS:
#   - /ah purchased
#   - Click the "Purchased Items" button in the main auction house
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# INVENTORY SETTINGS
#=============================================================================

# Inventory title with pagination placeholders.
name: '#0c1719Purchased items (%page%/%max-page%)'

# Inventory size - 6 rows.
size: 54

#=============================================================================
# PATTERNS
#=============================================================================

patterns:
  # Decorative glass pane borders.
  - 'zauctionhouse-decoration'
  # Previous/next page buttons.
  - 'zauctionhouse-pagination'
  # Back button to return to auction house.
  - 'zauctionhouse-back'

#=============================================================================
# ITEMS
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # PURCHASED ITEMS DISPLAY
  #---------------------------------------------------------------------------
  # Shows all items purchased by the viewing player.
  # Click items to retrieve them.

  items:
    # Button type - displays and handles purchased items.
    type: ZAUCTIONHOUSE_PURCHASED_ITEMS

    # Slot for empty state placeholder.
    empty-slot: 22

    # Slots for displaying purchased items (4 rows × 9 columns = 36 slots).
    slots:
      - 9-17    # Row 2
      - 18-26   # Row 3
      - 27-35   # Row 4
      - 36-44   # Row 5

    # Placeholder item when no purchased items exist.
    item:
      material: BARRIER
      name: '#ff0000&nNo items found'

  #---------------------------------------------------------------------------
  # REMOVE ALL BUTTON
  #---------------------------------------------------------------------------
  # Retrieves all purchased items at once (if inventory space allows).

  remove-all:
    type: ZAUCTIONHOUSE_REMOVE_ALL_PURCHASED
    is-permanent: true
    slot: 47
    item:
      material: CHEST
      name: "#2CCED2<bold>Retrieve All"
      lore:
        - "#92ffffRetrieve all purchased items."
        - ""
        - "#8c8c8c• #2CCED2Click #92ffffto retrieve all"
