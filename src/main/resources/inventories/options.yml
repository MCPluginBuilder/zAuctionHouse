################################################################################################################################
#
#   zAuctionHouse V4 - Player Options Inventory
#
#   This inventory allows players to toggle their personal preferences.
#   Currently supports broadcast notification opt-in/opt-out.
#
#   ACCESS:
#   - /ah option
#   - /ah options
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# INVENTORY SETTINGS
#=============================================================================

name: '#0c1719Options'
size: 27

#=============================================================================
# PATTERNS
#=============================================================================

patterns:
  - 'zauctionhouse-decoration'
  - 'zauctionhouse-back'

#=============================================================================
# ITEMS
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # BROADCAST SELL TOGGLE
  #---------------------------------------------------------------------------

  broadcast-sell:
    type: ZAUCTIONHOUSE_OPTION_TOGGLE
    slot: 11
    option-name: broadcast_sell
    enable-text: '<green>Enabled'
    disable-text: '<red>Disabled'
    item:
      material: OAK_SIGN
      name: '#2CCED2<bold>Sell Broadcasts'
      lore:
        - ''
        - '#92ffffToggle sell broadcast messages.'
        - '#92ffffWhen enabled, you will see messages'
        - '#92ffffwhen players list items for sale.'
        - ''
        - '#8c8c8cStatus: %option_status%'
        - ''
        - '#8c8c8c• #2CCED2Click #92ffffto toggle'

  #---------------------------------------------------------------------------
  # BROADCAST PURCHASE TOGGLE
  #---------------------------------------------------------------------------

  broadcast-purchase:
    type: ZAUCTIONHOUSE_OPTION_TOGGLE
    slot: 15
    option-name: broadcast_purchase
    enable-text: '<green>Enabled'
    disable-text: '<red>Disabled'
    item:
      material: GOLD_INGOT
      name: '#2CCED2<bold>Purchase Broadcasts'
      lore:
        - ''
        - '#92ffffToggle purchase broadcast messages.'
        - '#92ffffWhen enabled, you will see messages'
        - '#92ffffwhen players purchase items.'
        - ''
        - '#8c8c8cStatus: %option_status%'
        - ''
        - '#8c8c8c• #2CCED2Click #92ffffto toggle'
